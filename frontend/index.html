<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Expense Tracker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Serverless Expense Tracker</p>
        <h1>Track spending without running a server.</h1>
        <p class="hero-copy">
          Add expenses, review your full history, and check your total for a month.
        </p>
      </section>

      <section class="card">
        <h2>Add Expense</h2>
        <form id="expense-form">
          <label>
            Date
            <input id="expenseDate" name="expenseDate" type="date" required />
          </label>

          <label>
            Category
            <input id="category" name="category" type="text" placeholder="Groceries" required />
          </label>

          <label>
            Amount
            <input id="amount" name="amount" type="number" min="0.01" step="0.01" placeholder="25.99" required />
          </label>

          <label>
            Note
            <input id="note" name="note" type="text" placeholder="Weekly food run" />
          </label>

          <button type="submit">Save Expense</button>
        </form>
        <p id="form-status" class="status"></p>
      </section>

      <section class="card">
        <div class="section-heading">
          <h2>Monthly Total</h2>
          <div class="inline-controls">
            <input id="month-input" type="month" />
            <button id="load-monthly-total" type="button">Load Total</button>
          </div>
        </div>
        <p id="monthly-total" class="total-number">$0.00</p>
        <p id="monthly-summary" class="status"></p>
      </section>

      <section class="card">
        <div class="section-heading">
          <h2>All Expenses</h2>
          <button id="refresh-expenses" type="button">Refresh List</button>
        </div>
        <div id="expenses-list" class="expense-list"></div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
